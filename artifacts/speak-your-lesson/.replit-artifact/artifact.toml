kind = "web"
previewPath = "/"
title = "Speak Your Lesson Into Existence"
version = "1.0.0"
id = "artifacts/speak-your-lesson"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19644

[services.development]
run = "pnpm --filter @workspace/speak-your-lesson run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/speak-your-lesson", "run", "build" ]
publicDir = "artifacts/speak-your-lesson/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19644"
BASE_PATH = "/"
