name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        env:
          BASE_PATH: /scaffold/
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
        run: pnpm --filter @workspace/speak-your-lesson run build

      - name: Add GitHub Pages SPA fallback
        run: cp artifacts/speak-your-lesson/dist/public/index.html artifacts/speak-your-lesson/dist/public/404.html

      - name: Verify backend URL is configured
        if: ${{ vars.VITE_API_BASE_URL == '' }}
        run: |
          echo "Repository variable VITE_API_BASE_URL is missing."
          echo "Add the Render service URL under Settings > Secrets and variables > Actions > Variables."
          exit 1

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/speak-your-lesson/dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
